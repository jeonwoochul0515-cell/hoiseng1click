name: Build & Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx vite build

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project hoiseng1click --token "${{ secrets.FIREBASE_TOKEN }}"
