name = "lawdocs-worker"
main = "src/index.ts"
compatibility_date = "2024-09-01"

# R2 bucket (DOCX/HWPX file storage)
[[r2_buckets]]
binding = "DOCS_BUCKET"
bucket_name = "lawdocs-docs"

# KV (CODEF token caching)
[[kv_namespaces]]
binding = "TOKEN_CACHE"
id = "placeholder_replace_after_kv_create"

# Secrets (set via: wrangler secret put <NAME>)
# CODEF_CLIENT_ID
# CODEF_CLIENT_SECRET
# CODEF_API_HOST (optional, defaults to https://api.codef.io)
# FIREBASE_PROJECT_ID
# PUBLIC_DATA_API_KEY

# 개발환경 (데모 API)
[vars]
CODEF_API_HOST = "https://development.codef.io"
CODEF_CLIENT_ID = "c9fd9ae8-ed95-4929-a7b1-2c856a90325d"
CODEF_CLIENT_SECRET = "ea642760-235b-4647-9b52-f4d955b6bfb7"
FIREBASE_PROJECT_ID = "hoiseng1click"
CODEF_PUBLIC_KEY = ""
