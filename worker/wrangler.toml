name = "lawdocs-worker"
main = "src/index.ts"
compatibility_date = "2024-09-01"

# R2 bucket (DOCX/HWPX file storage)
[[r2_buckets]]
binding = "DOCS_BUCKET"
bucket_name = "lawdocs-docs"

# KV (CODEF token caching)
[[kv_namespaces]]
binding = "TOKEN_CACHE"
id = "placeholder_replace_after_kv_create"

# Secrets (set via: wrangler secret put <NAME>)
# CODEF_CLIENT_ID
# CODEF_CLIENT_SECRET
# CODEF_API_HOST (optional, defaults to https://api.codef.io)
# FIREBASE_PROJECT_ID
# PUBLIC_DATA_API_KEY

# 프로덕션 — 크레덴셜은 wrangler secret put으로 관리
# wrangler secret put CODEF_CLIENT_ID
# wrangler secret put CODEF_CLIENT_SECRET
# wrangler secret put CODEF_PUBLIC_KEY
# wrangler secret put PUBLIC_DATA_API_KEY
[vars]
CODEF_API_HOST = "https://api.codef.io"
FIREBASE_PROJECT_ID = "hoiseng1click"
