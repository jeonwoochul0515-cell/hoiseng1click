<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오프라인 - 회생원클릭</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f9fafb; color: #374151; }
    .box { text-align: center; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #6b7280; margin-bottom: 1.5rem; }
    button { background: #C9A84C; color: #0D1B2A; border: none; padding: 0.75rem 2rem; border-radius: 0.5rem; font-weight: bold; font-size: 0.875rem; cursor: pointer; }
  </style>
</head>
<body>
  <div class="box">
    <h1>인터넷 연결이 끊어졌습니다</h1>
    <p>네트워크 연결을 확인한 후 다시 시도해주세요.</p>
    <button onclick="window.location.reload()">새로고침</button>
  </div>
</body>
</html>
